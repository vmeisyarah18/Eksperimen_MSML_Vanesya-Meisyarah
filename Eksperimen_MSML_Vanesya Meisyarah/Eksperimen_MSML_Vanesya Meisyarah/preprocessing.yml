name: Automated Preprocessing

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install pandas numpy scikit-learn

    - name: Run Preprocessing Script
      run: |
        python preprocessing/automate_Vanesya-Meisyarah.py

    - name: Upload Preprocessed Dataset
      uses: actions/upload-artifact@v3
      with:
        name: preprocessed-diabetes
        path: |
          **/processed_diabetes.csv
          **/diabetes_preprocessing.csv
